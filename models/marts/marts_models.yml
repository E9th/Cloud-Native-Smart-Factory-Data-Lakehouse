version: 2

models:
  - name: fct_machine_health_hourly
    columns:
      - name: hour_ts
        tests:
          - not_null
      - name: machine_id
        tests:
          - not_null
  - name: fct_work_orders_status
    columns:
      - name: order_day
        tests:
          - not_null
      - name: machine_id
        tests:
          - not_null
  - name: fct_machine_risk_hourly
    columns:
      - name: hour_ts
        tests:
          - not_null
      - name: machine_id
        tests:
          - not_null
      - name: machine_risk_score
        tests:
          - not_null
      - name: machine_risk_level
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['LOW', 'MEDIUM', 'HIGH']