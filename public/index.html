<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Factory Sensor Dashboard</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --text: #17212f;
        --muted: #627489;
        --border: #dde3eb;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(120deg, #edf2f7, #f8fafc 45%, #eef8f7);
        color: var(--text);
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 24px rgba(23, 33, 47, 0.06);
      }

      .card .label {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .card .value {
        margin-top: 8px;
        font-size: 1.6rem;
        font-weight: 700;
      }

      .panel {
        margin-top: 16px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .panel h2 {
        margin: 0;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 1rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        font-size: 0.92rem;
      }

      th {
        background: #f4f7fb;
        color: #304258;
      }

      .hot {
        color: #b42318;
        font-weight: 700;
      }

      .ok {
        color: var(--accent);
        font-weight: 700;
      }

      .footer {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Smart Factory Sensor Dashboard</h1>
      <p class="subtitle">Realtime view of incoming sensor values from API and RabbitMQ publish pipeline.</p>

      <section class="stats">
        <article class="card">
          <div class="label">Queue</div>
          <div id="queue" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">Machines</div>
          <div id="machineCount" class="value">0</div>
        </article>
        <article class="card">
          <div class="label">Total Received</div>
          <div id="totalReceived" class="value">0</div>
        </article>
        <article class="card">
          <div class="label">Total Published</div>
          <div id="totalPublished" class="value">0</div>
        </article>
      </section>

      <section class="panel">
        <h2>Latest Sensor per Machine</h2>
        <table>
          <thead>
            <tr>
              <th>Machine ID</th>
              <th>Temperature</th>
              <th>Vibration</th>
              <th>Timestamp</th>
            </tr>
          </thead>
          <tbody id="machineTable"></tbody>
        </table>
      </section>

      <p id="serverTime" class="footer"></p>
    </main>

    <script>
      const queueEl = document.getElementById("queue");
      const machineCountEl = document.getElementById("machineCount");
      const totalReceivedEl = document.getElementById("totalReceived");
      const totalPublishedEl = document.getElementById("totalPublished");
      const machineTableEl = document.getElementById("machineTable");
      const serverTimeEl = document.getElementById("serverTime");

      const renderMachineRows = (machines) => {
        if (!machines.length) {
          machineTableEl.innerHTML =
            '<tr><td colspan="4" style="color:#627489">No sensor data yet. Start posting to /api/sensor-data.</td></tr>';
          return;
        }

        machineTableEl.innerHTML = machines
          .map((m) => {
            const tempClass = Number(m.temperature) >= 90 ? "hot" : "ok";
            return `
              <tr>
                <td>${m.machine_id}</td>
                <td class="${tempClass}">${Number(m.temperature).toFixed(2)} °C</td>
                <td>${Number(m.vibration).toFixed(2)} mm/s</td>
                <td>${m.timestamp}</td>
              </tr>
            `;
          })
          .join("");
      };

      const refresh = async () => {
        try {
          const response = await fetch("/api/dashboard", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          queueEl.textContent = data.queue;
          machineCountEl.textContent = String(data.machine_count);
          totalReceivedEl.textContent = String(data.total_received);
          totalPublishedEl.textContent = String(data.total_published);
          renderMachineRows(data.machines || []);
          serverTimeEl.textContent = `Server time: ${data.server_time}`;
        } catch (error) {
          serverTimeEl.textContent = `Dashboard update failed: ${error}`;
        }
      };

      refresh();
      setInterval(refresh, 1000);
    </script>
  </body>
</html>
